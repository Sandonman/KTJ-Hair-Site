<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTJ Hair</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #CFFEFF;
            font-family: 'Lora', serif;
            color: #1F2933;
        }
        header {
            background-color: #FFF940;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        nav a {
            margin: 0 15px;
            color: #1F2933; /* Primary Text */
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            background-color: #C85F55; /* Button Color */
            color: #F9FAFB; /* Light Text */
        }
        .header-title {
            color: #1F2933;
            font-size: 2.5em;
            font-weight: bold;
            margin: 0;
        }
        section {
            margin: 20px;
        }
        section h2 {
            background-color: #36E3A7; /* Sub-Header Background Color */
            color: #1F2933; /* Primary Text Color */
            padding: 10px;
            border-radius: 5px; /* Optional for rounded corners */
            text-align: center; /* Center the text */
        }
        .about-image {
            display: block;
            width: 100%;
            height: auto;
            margin: 0 auto;
            border: 2px dashed #1F2933; /* Optional border style */
        }
        .gallery-images {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .gallery-image {
            width: 30%;
            height: auto;
            border: 2px dashed #1F2933; /* Optional border style */
        }
    </style>
</head>
<body>
    <header>
        <h1 class="header-title">KTJ Hair</h1>
        <nav>
            <a href="#about">About</a>
            <a href="#gallery">Gallery</a>
            <a href="#services">Services</a>
            <a href="#booking">Booking</a>
            <a href="#contact">Contact Me</a>
        </nav>
    </header>
    <section id="about">
        <h2>About</h2>
        <img class="about-image" src="" alt="About Image Placeholder">
        <p>Placeholder for About content...</p>
    </section>
    <section id="gallery">
        <h2>Gallery</h2>
        <div class="gallery-images">
            <img class="gallery-image" src="" alt="Gallery Image 1 Placeholder">
            <img class="gallery-image" src="" alt="Gallery Image 2 Placeholder">
            <img class="gallery-image" src="" alt="Gallery Image 3 Placeholder">
        </div>
    </section>
    <section id="services">
        <h2>Services</h2>
        <p>Placeholder for Services content...</p>
    </section>
    <section id="booking">
        <h2>Booking</h2>
        <p>Placeholder for Booking content...</p>
    </section>
    <section id="contact">
        <h2>Contact Me</h2>
        <p>Placeholder for Contact content...</p>
    </section>
</body>
</html>
