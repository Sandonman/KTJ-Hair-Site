<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KTJ Hair Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #faf7ef;
      color: #1f2933;
      margin: 0;
      padding: 24px;
    }
    h1, h2, h3 {
      text-align: center;
    }
    .section {
      max-width: 1100px;
      margin: 0 auto 32px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      background: #fff;
    }
    .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .empty {
      text-align: center;
      color: #666;
      padding: 20px;
    }
    .calendar-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
    .calendar-nav button {
      width: auto;
      padding: 10px 16px;
    }
    .calendar-layout {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(320px, 1.2fr);
      gap: 20px;
      align-items: start;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 16px;
    }
    .calendar-header, .calendar-day {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
    }
    .calendar-header {
      font-weight: bold;
      background: #f1efe7;
    }
    .calendar-day {
      background: #f8f8f8;
      cursor: pointer;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #eee;
    }
    .calendar-day.has-availability {
      background: #cfe8d1;
      color: #1f2933;
      font-weight: bold;
    }
    .calendar-day.full {
      background: #e7b4b4;
      color: #1f2933;
      font-weight: bold;
    }
    .calendar-day.selected {
      outline: 3px solid #1f2933;
    }
    .calendar-day.muted {
      color: #bbb;
      cursor: default;
      background: #fbfbfb;
    }
    .calendar-key {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      font-size: 14px;
    }
    .calendar-key span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .key-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      display: inline-block;
      border: 1px solid rgba(0,0,0,0.1);
    }
    .day-schedule {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      background: #fcfcfc;
      min-height: 520px;
    }
    .schedule-grid {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 8px;
    }
    .schedule-times {
      position: relative;
    }
    .schedule-time {
      position: absolute;
      right: 0;
      transform: translateY(-50%);
      font-size: 12px;
      color: #666;
      white-space: nowrap;
    }
    .schedule-track {
      position: relative;
      height: 640px;
      background: repeating-linear-gradient(
        to bottom,
        #ffffff 0,
        #ffffff 19px,
        #ececec 19px,
        #ececec 20px
      );
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }
    .appointment-chip {
      position: absolute;
      left: 8px;
      right: 8px;
      border-radius: 10px;
      padding: 8px 10px;
      color: #1f2933;
      font-size: 12px;
      border: 1px solid rgba(0,0,0,0.08);
      cursor: pointer;
      text-align: left;
      overflow: hidden;
    }
    .appointment-chip.buffer {
      background: #e5e7eb;
      cursor: default;
    }
    .appointment-chip strong {
      display: block;
      margin-bottom: 4px;
    }
    .details-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 2100;
    }
    .details-modal.active {
      display: flex;
    }
    .details-card {
      background: #fff;
      width: 100%;
      max-width: 520px;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 14px 32px rgba(0,0,0,0.22);
    }
    .details-card h3 {
      margin-top: 0;
      text-align: left;
    }
    .details-card p {
      margin: 8px 0;
    }
    @media (max-width: 900px) {
      .calendar-layout {
        grid-template-columns: 1fr;
      }
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input, textarea, select, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      background: #d48c96;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .note-photo {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
    .success {
      color: #2e7d32;
      font-weight: bold;
      text-align: center;
    }
    .danger-button {
      background: #b42318;
      margin-top: 12px;
    }
    .secondary-button {
      background: #6b7280;
      width: auto;
      padding: 10px 16px;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .client-mode-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .client-search-results {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px;
      background: #fafafa;
      display: none;
    }
    .client-search-results button {
      width: 100%;
      text-align: left;
      background: transparent;
      color: #1f2933;
      border: 1px solid #eee;
      margin-bottom: 6px;
    }
    .client-search-results button:last-child {
      margin-bottom: 0;
    }
    .photo-thumb {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ddd;
      cursor: pointer;
      background: #f8f8f8;
    }
    .photo-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      text-align: center;
    }
    .image-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 2000;
    }
    .image-modal.active {
      display: flex;
    }
    .image-modal img {
      max-width: 95vw;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div id="adminLoadingSection" class="section">
    <h2>Loading admin...</h2>
    <div class="empty">Checking secure access.</div>
  </div>

  <h1 id="adminTitle" style="display:none;">KTJ Hair Admin</h1>

  <div class="section" id="adminLoginSection" style="display:none;">
    <h2>Admin Login</h2>
    <form id="adminLoginForm" style="max-width: 420px; margin: 0 auto;">
      <input type="password" name="password" placeholder="Admin Password" required />
      <button type="submit">Log In</button>
      <div id="adminLoginStatus" class="empty"></div>
    </form>
  </div>

  <div id="adminApp" style="display:none;">
  <div class="section" style="display:flex; justify-content:flex-end; align-items:center; gap:12px;">
    <button type="button" id="adminLogoutButton" class="secondary-button">Log Out</button>
  </div>
  <div class="section">
    <h2>Booking Calendar</h2>
    <div class="calendar-layout">
      <div>
        <div class="calendar-nav">
          <button type="button" id="prevMonthBtn">Previous Month</button>
          <strong id="calendarMonthLabel"></strong>
          <button type="button" id="nextMonthBtn">Next Month</button>
        </div>
        <div id="calendar"></div>
        <div class="calendar-key">
          <span><span class="key-swatch" style="background:#f8f8f8;"></span> Empty day</span>
          <span><span class="key-swatch" style="background:#cfe8d1;"></span> Has openings</span>
          <span><span class="key-swatch" style="background:#e7b4b4;"></span> Full day</span>
        </div>
      </div>
      <div>
        <h3 id="selectedDayHeading">Select a day</h3>
        <div id="selectedDayBookings" class="day-schedule"></div>
      </div>
    </div>
  </div>

  <div class="section grid">
    <div>
      <h2>Add Booking for Katie</h2>
      <form id="manualBookingForm">
        <div class="client-mode-row">
          <label><input type="radio" name="clientMode" value="new" checked /> New Client</label>
          <label><input type="radio" name="clientMode" value="returning" /> Returning Client</label>
        </div>
        <div id="newClientFields">
          <input name="name" placeholder="Client Name" required />
          <input name="phone" placeholder="Client Phone" required />
          <input name="email" type="email" placeholder="Client Email" required />
        </div>
        <div id="returningClientFields" style="display:none;">
          <input name="returningClientSearch" id="returningClientSearch" placeholder="Search client name or phone" />
          <div id="returningClientResults" class="client-search-results"></div>
          <input type="hidden" name="selectedClientName" id="selectedClientName" />
          <input type="hidden" name="selectedClientPhone" id="selectedClientPhone" />
          <input type="hidden" name="selectedClientEmail" id="selectedClientEmail" />
          <div id="selectedClientDisplay" class="empty">No returning client selected.</div>
        </div>
        <select name="service" id="manualServiceSelect" required>
          <option value="">Select Service</option>
          <option value="haircut">Haircut</option>
          <option value="full-highlight">Full Highlight</option>
          <option value="partial-highlight">Partial Highlight</option>
          <option value="area-highlight">Area Highlight</option>
          <option value="all-over-color">All Over Color</option>
          <option value="root-touch-up">Root Touch Up</option>
          <option value="partial-highlight-grey">Partial Highlight/Grey Coverage</option>
          <option value="gloss">Gloss</option>
          <option value="gloss-haircut">Gloss and Haircut</option>
          <option value="other">Other</option>
        </select>
        <input name="customService" id="customServiceInput" placeholder="Enter custom service" style="display:none;" />
        <label><input type="checkbox" name="addHaircut" /> Add Haircut</label>
        <input name="appointmentDate" type="date" required />
        <select name="appointmentTime" id="manualAppointmentTime" required></select>
        <textarea name="notes" placeholder="Notes"></textarea>
        <label><input type="checkbox" name="skipConfirmation" /> Add booking without sending confirmation email or text</label>
        <select name="status">
          <option value="confirmed">Confirmed</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button type="submit">Save Booking</button>
        <div id="manualBookingStatus"></div>
      </form>
    </div>

    <div>
      <h2>Client Notes</h2>
      <form id="clientNotesForm">
        <input name="clientName" placeholder="Client Name" required />
        <input name="clientPhone" placeholder="Client Phone" />
        <input name="clientEmail" type="email" placeholder="Client Email" />
        <textarea name="formulaNotes" placeholder="Color formulas"></textarea>
        <textarea name="styleNotes" placeholder="Styles / preferences"></textarea>
        <textarea name="generalNotes" placeholder="General notes"></textarea>
        <input type="file" name="hairPhoto" accept="image/*" />
        <button type="submit">Save Client Note</button>
        <div id="clientNotesStatus"></div>
      </form>
    </div>
  </div>

  <div class="section">
    <h2>Client Notes</h2>
    <div class="grid">
      <div>
        <input id="clientNotesSearch" placeholder="Search by client name or phone number" />
      </div>
    </div>
    <div id="clientNotesList"></div>
  </div>

  <div class="section">
    <h2>Contact Messages</h2>
    <div id="messages"></div>
  </div>

  <div id="imageModal" class="image-modal" onclick="closeImageModal()">
    <img id="imageModalPreview" src="" alt="Preview" onclick="event.stopPropagation()" />
  </div>

  <div id="appointmentDetailsModal" class="details-modal" onclick="closeAppointmentDetails()">
    <div class="details-card" onclick="event.stopPropagation()">
      <h3 id="appointmentDetailsTitle">Appointment Details</h3>
      <div id="appointmentDetailsBody"></div>
      <div style="display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; margin-top:16px;">
        <button type="button" id="editAppointmentButton">Edit Appointment</button>
        <button type="button" class="secondary-button" onclick="closeAppointmentDetails()">Close</button>
      </div>
    </div>
  </div>

  <div id="editAppointmentModal" class="details-modal" onclick="closeEditAppointmentModal()">
    <div class="details-card" onclick="event.stopPropagation()">
      <h3>Edit Appointment</h3>
      <form id="editAppointmentForm">
        <input type="hidden" name="bookingId" />
        <select name="service" id="editAppointmentService" required>
          <option value="haircut">Haircut</option>
          <option value="full-highlight">Full Highlight</option>
          <option value="partial-highlight">Partial Highlight</option>
          <option value="area-highlight">Area Highlight</option>
          <option value="all-over-color">All Over Color</option>
          <option value="root-touch-up">Root Touch Up</option>
          <option value="partial-highlight-grey">Partial Highlight/Grey Coverage</option>
          <option value="gloss">Gloss</option>
          <option value="gloss-haircut">Gloss and Haircut</option>
          <option value="other">Other</option>
        </select>
        <input name="appointmentDate" type="date" required />
        <select name="appointmentTime" id="editAppointmentTime" required></select>
        <label><input type="checkbox" name="addHaircut" /> Add Haircut</label>
        <textarea name="notes" placeholder="Notes"></textarea>
        <select name="status">
          <option value="confirmed">Confirmed</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <div id="editAppointmentStatus"></div>
        <div style="display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;">
          <button type="submit">Save Changes</button>
          <button type="button" class="secondary-button" onclick="closeEditAppointmentModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
  </div>

  <script>
    const API_BASE = 'https://ktj-hair-site.onrender.com';
    const ADMIN_SESSION_STORAGE_KEY = 'ktj_admin_session_token';

    function getAdminSessionHeaders() {
      const token = window.localStorage.getItem(ADMIN_SESSION_STORAGE_KEY);
      return token ? { 'x-admin-session': token } : {};
    }

    function setAdminVisibility(isAuthenticated, isLoading = false) {
      document.getElementById('adminLoadingSection').style.display = isLoading ? 'block' : 'none';
      document.getElementById('adminTitle').style.display = isLoading ? 'none' : 'block';
      document.getElementById('adminLoginSection').style.display = (!isAuthenticated && !isLoading) ? 'block' : 'none';
      document.getElementById('adminApp').style.display = (isAuthenticated && !isLoading) ? 'block' : 'none';
    }
    const SERVICE_DURATIONS = {
      'haircut': 120,
      'full-highlight': 240,
      'partial-highlight': 180,
      'area-highlight': 120,
      'all-over-color': 120,
      'root-touch-up': 90,
      'partial-highlight-grey': 180,
      'partial highlight': 180,
      'partial highlight/grey coverage': 180,
      'gloss': 90,
      'gloss-haircut': 150,
      'gloss and haircut': 150,
      'full highlight': 240,
      'area highlight': 120,
      'all over color': 120,
      'root touch up': 90,
      'other': 120,
    };
    let bookings = [];
    let clientNotes = [];
    let currentCalendarDate = new Date();
    let selectedDateLabel = '';
    let selectedBookingId = null;

    const SERVICE_COLORS = {
      haircut: '#f8c8dc',
      'full-highlight': '#fde68a',
      'partial-highlight': '#bfdbfe',
      'area-highlight': '#c7d2fe',
      'all-over-color': '#fecaca',
      'root-touch-up': '#fca5a5',
      'partial-highlight-grey': '#ddd6fe',
      gloss: '#a7f3d0',
      'gloss-haircut': '#f9d5a7',
      other: '#d1d5db',
    };

    function normalizeServiceKey(service) {
      return (service || '').trim().toLowerCase();
    }

    function renderEmpty(el, text) {
      el.innerHTML = `<div class="empty">${text}</div>`;
    }

    function renderPhotoThumb(url, label) {
      if (!url) return '';
      const safeUrl = String(url).replace(/'/g, '&#39;');
      return `
        <div>
          <img src="${safeUrl}" alt="${label}" class="photo-thumb" onclick="openImageModal('${safeUrl}')" />
          <div class="photo-label">${label}</div>
        </div>
      `;
    }

    function formatTime12Hour(value) {
      if (!value) return '';
      const [hours, minutes] = String(value).split(':').map(Number);
      if (Number.isNaN(hours) || Number.isNaN(minutes)) return value;
      const suffix = hours >= 12 ? 'PM' : 'AM';
      const hour12 = ((hours + 11) % 12) + 1;
      return `${hour12}:${String(minutes).padStart(2, '0')} ${suffix}`;
    }

    function bookingCard(booking) {
      return `
        <div class="card">
          <div class="meta">${new Date(booking.created_at).toLocaleString()}</div>
          <strong>${booking.name}</strong><br>
          ${booking.email || ''}<br>
          ${booking.phone || ''}<br><br>
          <strong>Service:</strong> ${booking.service}<br>
          <strong>Date:</strong> ${booking.appointment_date}<br>
          <strong>Time:</strong> ${formatTime12Hour(booking.appointment_time)}<br>
          <strong>Add Haircut:</strong> ${booking.add_haircut ? 'Yes' : 'No'}<br>
          <strong>Status:</strong> ${booking.status}<br><br>
          <strong>Notes:</strong> ${booking.notes || 'None'}
          <div class="photo-grid">
            ${renderPhotoThumb(booking.current_hair_image_signed_url, 'Current Hair')}
            ${renderPhotoThumb(booking.inspiration_image_signed_url, 'Inspiration')}
          </div>
          <button type="button" class="danger-button" onclick="deleteBooking('${booking.id}')">Delete Booking</button>
        </div>
      `;
    }

    function messageCard(message) {
      return `
        <div class="card">
          <div class="meta">${new Date(message.created_at).toLocaleString()}</div>
          <strong>${message.name}</strong><br>
          ${message.email}<br>
          ${message.phone || ''}<br><br>
          <strong>Status:</strong> ${message.status}<br><br>
          <strong>Message:</strong><br>
          ${message.message}
        </div>
      `;
    }

    function getMatchingBookingsForClient(note) {
      return bookings.filter((booking) => {
        const sameName = (booking.name || '').trim().toLowerCase() === (note.client_name || '').trim().toLowerCase();
        const samePhone = note.client_phone && booking.phone && note.client_phone.trim() === booking.phone.trim();
        const isCancelled = (booking.status || '').toLowerCase() === 'cancelled';
        return (sameName || samePhone) && !isCancelled;
      });
    }

    function getClientAppointments(note) {
      const matchingBookings = getMatchingBookingsForClient(note);

      const now = new Date();
      const parsed = matchingBookings.map((booking) => {
        const dateTime = new Date(`${booking.appointment_date} ${booking.appointment_time}`);
        return { ...booking, parsedDate: dateTime };
      }).filter((booking) => !Number.isNaN(booking.parsedDate.getTime()));

      const past = parsed
        .filter((booking) => booking.parsedDate < now)
        .sort((a, b) => b.parsedDate - a.parsedDate);
      const upcoming = parsed
        .filter((booking) => booking.parsedDate >= now)
        .sort((a, b) => a.parsedDate - b.parsedDate);

      return {
        last: past[0] || null,
        upcoming: upcoming[0] || null,
      };
    }

    function noteCard(note) {
      const appointments = getClientAppointments(note);
      const matchingBookings = getMatchingBookingsForClient(note);
      const lastAppointment = appointments.last
        ? `${appointments.last.appointment_date} at ${formatTime12Hour(appointments.last.appointment_time)}`
        : 'None found';
      const upcomingAppointment = appointments.upcoming
        ? `${appointments.upcoming.appointment_date} at ${formatTime12Hour(appointments.upcoming.appointment_time)}`
        : 'None scheduled';

      const photoItems = [];

      if (note.hair_photo_signed_url) {
        photoItems.push(renderPhotoThumb(note.hair_photo_signed_url, 'Client Record Photo'));
      }

      matchingBookings.forEach((booking, index) => {
        const bookingLabel = `${booking.appointment_date} ${formatTime12Hour(booking.appointment_time)}`;
        if (booking.current_hair_image_signed_url) {
          photoItems.push(renderPhotoThumb(booking.current_hair_image_signed_url, `Current Hair, ${bookingLabel}`));
        }
        if (booking.inspiration_image_signed_url) {
          photoItems.push(renderPhotoThumb(booking.inspiration_image_signed_url, `Inspiration, ${bookingLabel}`));
        }
      });

      return `
        <div class="card">
          <div class="meta">${new Date(note.created_at).toLocaleString()}</div>
          <strong>${note.client_name}</strong><br>
          ${note.client_email || ''}<br>
          ${note.client_phone || ''}<br><br>
          <strong>Last Appointment:</strong> ${lastAppointment}<br>
          <strong>Upcoming Appointment:</strong> ${upcomingAppointment}<br><br>
          <strong>Formula Notes:</strong> ${note.formula_notes || 'None'}<br><br>
          <strong>Style Notes:</strong> ${note.style_notes || 'None'}<br><br>
          <strong>General Notes:</strong> ${note.general_notes || 'None'}
          <div class="photo-grid">
            ${photoItems.length ? photoItems.join('') : '<div class="empty">No photos yet.</div>'}
          </div>
        </div>
      `;
    }

    function openImageModal(url) {
      document.getElementById('imageModalPreview').src = url;
      document.getElementById('imageModal').classList.add('active');
    }

    function closeImageModal() {
      document.getElementById('imageModal').classList.remove('active');
      document.getElementById('imageModalPreview').src = '';
    }

    function normalizeDateLabel(value) {
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function formatAdminDateForApi(value) {
      if (!value) return value;
      const [year, month, day] = value.split('-').map(Number);
      if (!year || !month || !day) return normalizeDateLabel(value);
      const parsed = new Date(year, month - 1, day);
      return parsed.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function getServiceColor(service) {
      return SERVICE_COLORS[normalizeServiceKey(service)] || SERVICE_COLORS.other;
    }

    function getDailyBookings(dateLabel) {
      return bookings
        .filter((booking) => normalizeDateLabel(booking.appointment_date) === dateLabel)
        .sort((a, b) => a.appointment_time.localeCompare(b.appointment_time));
    }

    function dayHasAvailability(dateLabel) {
      const daily = getDailyBookings(dateLabel).filter((booking) => (booking.status || '').toLowerCase() !== 'cancelled');
      if (!daily.length) return false;

      for (let minutes = 9 * 60; minutes < 19 * 60; minutes += 30) {
        const hasOpenHour = !daily.some((booking) => {
          const start = Number(booking.appointment_time.split(':')[0]) * 60 + Number(booking.appointment_time.split(':')[1]);
          const duration = (SERVICE_DURATIONS[normalizeServiceKey(booking.service)] || 120) + (booking.add_haircut ? 30 : 0);
          const end = start + duration + 60;
          const slotEnd = minutes + 60;
          return minutes < end && start < slotEnd;
        });

        if (hasOpenHour && minutes + 60 <= 19 * 60) {
          return true;
        }
      }

      return false;
    }

    function renderDaySchedule(dateLabel) {
      const target = document.getElementById('selectedDayBookings');
      document.getElementById('selectedDayHeading').textContent = `Schedule for ${dateLabel}`;
      const daily = getDailyBookings(dateLabel).filter((booking) => (booking.status || '').toLowerCase() !== 'cancelled');
      const hasEarlyBooking = daily.some((booking) => {
        const startMinutes = Number(booking.appointment_time.split(':')[0]) * 60 + Number(booking.appointment_time.split(':')[1]);
        return startMinutes < 9 * 60;
      });
      const hasLateBooking = daily.some((booking) => {
        const startMinutes = Number(booking.appointment_time.split(':')[0]) * 60 + Number(booking.appointment_time.split(':')[1]);
        const duration = (SERVICE_DURATIONS[normalizeServiceKey(booking.service)] || 120) + (booking.add_haircut ? 30 : 0);
        return (startMinutes + duration) > 19 * 60;
      });
      const dayStart = hasEarlyBooking ? 5 * 60 : 9 * 60;
      const dayEnd = hasLateBooking ? 21 * 60 : 19 * 60;
      const timelineHeight = 520;
      const pixelsPerMinute = timelineHeight / (dayEnd - dayStart);

      const timesHtml = Array.from({ length: ((dayEnd - dayStart) / 30) + 1 }, (_, index) => {
        const minutes = dayStart + (index * 30);
        const top = (minutes - dayStart) * pixelsPerMinute;
        return `<div class="schedule-time" style="top:${top}px;">${formatTime12Hour(`${String(Math.floor(minutes / 60)).padStart(2, '0')}:${String(minutes % 60).padStart(2, '0')}`)}</div>`;
      }).join('');

      if (!daily.length) {
        target.innerHTML = `<div class="schedule-grid"><div class="schedule-times">${timesHtml}</div><div class="schedule-track" style="height:${timelineHeight}px;"><div class="empty">No bookings for that date.</div></div></div>`;
        return;
      }

      const blocks = [];
      daily.forEach((booking) => {
        const startMinutes = Number(booking.appointment_time.split(':')[0]) * 60 + Number(booking.appointment_time.split(':')[1]);
        const duration = (SERVICE_DURATIONS[normalizeServiceKey(booking.service)] || 120) + (booking.add_haircut ? 30 : 0);
        const serviceEnd = startMinutes + duration;
        const bufferEnd = serviceEnd + 60;

        blocks.push({
          type: 'service',
          booking,
          startMinutes,
          endMinutes: serviceEnd,
        });
        blocks.push({
          type: 'buffer',
          booking,
          startMinutes: serviceEnd,
          endMinutes: bufferEnd,
        });
      });

      blocks.sort((a, b) => a.startMinutes - b.startMinutes);

      const blockHtml = blocks.map((block) => {
        const top = Math.max(0, (block.startMinutes - dayStart) * pixelsPerMinute);
        const height = Math.max(18, (block.endMinutes - block.startMinutes) * pixelsPerMinute);
        if (block.type === 'buffer') {
          return `<div class="appointment-chip buffer" style="top:${top}px; height:${height}px;">Buffer</div>`;
        }
        return `<button type="button" class="appointment-chip" style="top:${top}px; height:${height}px; background:${getServiceColor(block.booking.service)};" onclick="showAppointmentDetails('${block.booking.id}')"><strong>${block.booking.name}</strong>${block.booking.service}<br>${formatTime12Hour(block.booking.appointment_time)}</button>`;
      }).join('');

      target.innerHTML = `
        <div class="schedule-grid">
          <div class="schedule-times">${timesHtml}</div>
          <div class="schedule-track" style="height:${timelineHeight}px;">${blockHtml}</div>
        </div>
      `;
    }

    function renderCalendar(bookings) {
      const calendarEl = document.getElementById('calendar');
      const year = currentCalendarDate.getFullYear();
      const month = currentCalendarDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      document.getElementById('calendarMonthLabel').textContent = currentCalendarDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      let html = '<div class="calendar">';
      html += days.map(day => `<div class="calendar-header">${day}</div>`).join('');

      for (let i = 0; i < firstDay.getDay(); i++) {
        html += '<div class="calendar-day muted"></div>';
      }

      for (let day = 1; day <= lastDay.getDate(); day++) {
        const current = new Date(year, month, day);
        const label = current.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        const dailyBookings = getDailyBookings(label).filter((booking) => (booking.status || '').toLowerCase() !== 'cancelled');
        const hasBookings = dailyBookings.length > 0;
        const className = !hasBookings ? '' : dayHasAvailability(label) ? 'has-availability' : 'full';
        const selected = selectedDateLabel === label ? ' selected' : '';
        html += `<div class="calendar-day ${className}${selected}" onclick="showBookingsForDate('${label.replace(/'/g, "\\'")}')">${day}</div>`;
      }

      html += '</div>';
      calendarEl.innerHTML = html;
    }

          fetch(`${API_BASE}/api/admin/bookings`, { credentials: 'include', headers: getAdminSessionHeaders() }),
          fetch(`${API_BASE}/api/admin/contact-messages`, { credentials: 'include', headers: getAdminSessionHeaders() }),
          fetch(`${API_BASE}/api/admin/client-notes`, { credentials: 'include', headers: getAdminSessionHeaders() })
        ]);

        if ([bookingsRes, messagesRes, notesRes].some((response) => response.status === 401)) {
          setAdminVisibility(false);
          return false;
        }

        if ([bookingsRes, messagesRes, notesRes].some((response) => !response.ok)) {
          throw new Error('Failed to load admin data.');
        }

        const bookingsData = await bookingsRes.json();
        const messagesData = await messagesRes.json();
        const notesData = await notesRes.json();

        bookings = bookingsData.bookings || [];
        renderCalendar(bookings);

        const selectedDayEl = document.getElementById('selectedDayBookings');

          ? 'Select a day'

        if (!clientNotes.length) {
          renderEmpty(notesEl, 'No client notes yet. Saved notes will appear here.');

        notesEl.innerHTML = '<div class="empty">Failed to load client notes.</div>';

    const ADMIN_BASE_TIME_OPTIONS = (() => {

      for (let minutes = startMinutes; minutes <= endMinutes; minutes += 30) {
        const hour24 = Math.floor(minutes / 60);
        const minute = minutes % 60;
        const suffix = hour24 >= 12 ? 'PM' : 'AM';

        const value = `${String(hour24).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
        const label = `${hour12}:${String(minute).padStart(2, '0')} ${suffix}`;
        options.push({ value, label });
      }

      return options;
    })();

    async function refreshAvailability({ dateValue, selectEl, serviceValue, addHaircutChecked, excludeBookingId = null }) {
      populateAdminTimeOptions(selectEl);

      if (!dateValue) return;

      const formattedDate = formatAdminDateForApi(dateValue);
      const response = await fetch(`${API_BASE}/api/bookings/availability?date=${encodeURIComponent(formattedDate)}`, { credentials: 'include' });
      const data = await response.json();
      const requestedDuration = (SERVICE_DURATIONS[normalizeServiceKey(serviceValue)] || 120) + (addHaircutChecked ? 30 : 0);
      const relevantBookings = (data.bookings || []).filter((booking) => booking.id !== excludeBookingId);

      const rebuiltOptions = ADMIN_BASE_TIME_OPTIONS.map((option) => {
        if (!option.value) {
          return `<option value="">${option.label}</option>`;
        }

        const [hour, minute] = option.value.split(':').map(Number);
        const optionMinutes = (hour * 60) + minute;
        const optionEnd = optionMinutes + requestedDuration;
        const overlap = relevantBookings.some((booking) => {
          const [bookedHour, bookedMinute] = booking.appointment_time.split(':').map(Number);
          const bookedStart = (bookedHour * 60) + bookedMinute;
          const bookedDuration = (SERVICE_DURATIONS[normalizeServiceKey(booking.service)] || 120) + (booking.add_haircut ? 30 : 0);
          const bookedEnd = bookedStart + bookedDuration;
          return optionMinutes < bookedEnd && bookedStart < optionEnd;
        });
        const conflict = relevantBookings.some((booking) => {
          const [bookedHour, bookedMinute] = booking.appointment_time.split(':').map(Number);
          const bookedStart = (bookedHour * 60) + bookedMinute;
          const bookedDuration = (SERVICE_DURATIONS[normalizeServiceKey(booking.service)] || 120) + (booking.add_haircut ? 30 : 0);
          const bookedEnd = bookedStart + bookedDuration;
          return optionMinutes < (bookedEnd + 60) && bookedStart < (optionEnd + 60);
        });

        if (overlap) {
          return '';
        }

        const warningFlags = [];

        if (conflict) {
          warningFlags.push('data-warning-buffer="true"');
        }

        if (optionEnd > (19 * 60)) {
          warningFlags.push('data-warning-late="true"');
        }

        return `<option value="${option.value}" ${warningFlags.join(' ')}>${option.label}</option>`;
      }).join('');

      selectEl.innerHTML = rebuiltOptions;
    }

      renderClientNotesList(event.target.value);
    });

    document.getElementById('clientNotesForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);

      const response = await fetch(`${API_BASE}/api/admin/client-notes`, {
        method: 'POST',
        credentials: 'include',
        headers: getAdminSessionHeaders(),
        body: formData,
      });

      document.getElementById('clientNotesStatus').innerHTML = response.ok
        ? '<div class="success">Client note saved.</div>'
        : '<div class="empty">Failed to save client note.</div>';

      if (response.ok) {
        form.reset();
        loadAdminData();
      }
    });

    document.getElementById('adminLoginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = event.target.elements.password.value;
      const response = await fetch(`${API_BASE}/api/admin/login`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });

      let loginMessage = '<div class="empty">Invalid password.</div>';
      let loginResult = null;
      if (response.ok) {
        loginResult = await response.json();
        if (loginResult?.sessionToken) {
          window.localStorage.setItem(ADMIN_SESSION_STORAGE_KEY, loginResult.sessionToken);
        }
        loginMessage = '<div class="success">Logged in.</div>';
      } else if (response.status === 429) {
        loginMessage = '<div class="empty">Too many login attempts. Please wait and try again.</div>';
      }

      document.getElementById('adminLoginStatus').innerHTML = loginMessage;

      if (response.ok) {
        event.target.reset();
        setAdminVisibility(false, true);
        populateAdminTimeOptions();
        const loaded = await loadAdminData();
        setAdminVisibility(Boolean(loaded), false);
      }
    });

    document.getElementById('adminLogoutButton').addEventListener('click', async () => {
      await fetch(`${API_BASE}/api/admin/logout`, {
        method: 'POST',
        credentials: 'include',
        headers: getAdminSessionHeaders(),
      });
      window.localStorage.removeItem(ADMIN_SESSION_STORAGE_KEY);
      document.getElementById('adminLoginStatus').innerHTML = '';
      setAdminVisibility(false, false);
    });

    setClientMode('new');

    async function initializeAdmin() {
      setAdminVisibility(false, true);
      const response = await fetch(`${API_BASE}/api/admin/session`, {
        credentials: 'include',
        headers: getAdminSessionHeaders(),
      });
      const result = await response.json();
      if (result.authenticated) {
        populateAdminTimeOptions();
        const loaded = await loadAdminData();
        setAdminVisibility(Boolean(loaded), false);
        return;
      }
      setAdminVisibility(false, false);
    }

    initializeAdmin();
  </script>
</body>
</html>
